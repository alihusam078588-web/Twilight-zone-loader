name: Discord File Updates

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed file
        id: changed
        run: |
          echo "file=$(git diff --name-only HEAD~1 HEAD | head -n 1)" >> $GITHUB_OUTPUT

      - name: Send Discord Webhook
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          FILE: ${{ steps.changed.outputs.file }}
          MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"${FILE}\n\n${MESSAGE}\"}" \
          "$WEBHOOK"
